name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Generate screenshot placeholders
        run: |
          # Create a minimal 1x1 transparent PNG as placeholder
          PLACEHOLDER="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg=="
          # Find every /screenshots/... reference in all markdown files and create the file
          grep -roh '/screenshots/[^"'\''  )>]*\.png' . --include='*.md' 2>/dev/null | sort -u | while read path; do
            dest="public${path}"
            mkdir -p "$(dirname "$dest")"
            echo "$PLACEHOLDER" | base64 -d > "$dest"
          done
          echo "Screenshot placeholders created."

      - name: Build with VitePress
        env:
          VITEPRESS_BASE: ${{ vars.VITEPRESS_BASE || '/' }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
